name: Reindex corpus

on:
  schedule:
    # Daily at 09:15 IST (03:45 UTC)
    - cron: "45 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reindex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Fetch latest Groww snapshots (Phase 1)
        run: python -m phases.phase1.run

      - name: Selective re-index (Phase 2.8)
        env:
          EMBEDDING_PROVIDER: openai
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
        run: python -m phases.phase2.reindex_job --json

      - name: Commit and push corpus updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # corpus/processed includes embedded_chunks.json; Render rebuilds data/vector_store on boot
          git add corpus/raw corpus/metadata corpus/processed
          if git diff --staged --quiet; then
            echo "No corpus changes to commit."
          else
            git commit -m "chore: refresh corpus from Groww snapshots"
            git push
          fi
